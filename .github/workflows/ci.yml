name: GIMP MCP CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-asyncio pytest-cov httpx fastmcp
        pip install -e .
        
    - name: Run tests with coverage
      shell: pwsh
      run: |
        $Env:PYTHONPATH = "src"
        python -m pytest `
          --cov=gimp_mcp `
          --cov-report=term-missing `
          --cov-report=xml `
          tests/

    - name: Fleet E2E offline smoke (Phase 6)
      shell: pwsh
      run: |
        $Env:PYTHONPATH = "src"
        python scripts/fleet_e2e_smoke.py --offline --strict
          
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        fail_ci_if_error: false
