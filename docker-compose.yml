# gimp-mcp Docker + optional monitoring stack.
#
# MCP only:
#   docker compose up gimp-mcp
#
# MCP + Prometheus/Grafana/Loki:
#   docker compose --profile monitoring up -d
#
# Note: GIMP GUI + Live Bridge runs on the HOST (port 10824), not in this container.

services:
  gimp-mcp:
    build:
      context: .
      target: production
    image: ghcr.io/sandraschi/gimp-mcp:latest
    container_name: gimp-mcp
    ports:
      - "10773:10773"
      - "9073:9073"
    environment:
      MCP_HOST: 0.0.0.0
      MCP_PORT: "10773"
      GIMP_MCP_METRICS_ENABLED: "true"
      PROMETHEUS_PORT: "9073"
      GIMP_MCP_LOG_FORMAT: json
      GIMP_MCP_LOG_LEVEL: INFO
      GIMP_MCP_BRIDGE_HOST: host.docker.internal
      GIMP_MCP_BRIDGE_PORT: "10824"
    volumes:
      - gimp-mcp-logs:/app/logs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    labels:
      promtail.job: gimp-mcp
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:10773/api/health', timeout=5)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  prometheus:
    profiles: ["monitoring"]
    image: prom/prometheus:v3.11.3
    container_name: gimp-mcp-prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    restart: unless-stopped

  loki:
    profiles: ["monitoring"]
    image: grafana/loki:3.7.1
    container_name: gimp-mcp-loki
    ports:
      - "3101:3100"
    volumes:
      - ./monitoring/loki/loki.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped

  promtail:
    profiles: ["monitoring"]
    image: grafana/promtail:3.7.1
    container_name: gimp-mcp-promtail
    volumes:
      - ./monitoring/promtail/promtail.yml:/etc/promtail/config.yml:ro
      - gimp-mcp-logs:/app/logs:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    restart: unless-stopped

  grafana:
    profiles: ["monitoring"]
    image: grafana/grafana:13.0.1
    container_name: gimp-mcp-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped

volumes:
  gimp-mcp-logs:
  prometheus-data:
  loki-data:
  grafana-data:

networks:
  default:
    name: gimp-mcp-net
